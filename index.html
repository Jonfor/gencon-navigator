<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Gen Con 2026 Events</title>
  <link href="main.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/minisearch@7.2.0/dist/umd/index.min.js"></script>
</head>
<body class="dark">
<header>
  <div class="logo">
    <h1>Gen Con 2026</h1>
    <span class="subtitle">Event Browser</span>
  </div>
  <div class="header-right">
    <span id="resultCount">Loading...</span>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
      <span class="toggle-icon" id="toggleIcon">☀️</span>
      <span id="toggleLabel">Light mode</span>
    </button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="section-label">Days</div>
    <div class="type-list" id="dayFilters"></div>

    <div class="section-label">Event Type
      <button class="btn-clear" onclick="allTypes()">all</button>
      <button class="btn-clear" onclick="clearTypes()">clear</button>
    </div>
    <div class="type-list" id="typeFilters"></div>

    <div class="section-label">Max Cost</div>
    <div class="cost-row">
      <input id="costSlider" max="1000" min="0" oninput="onCost(this.value)" step="5" type="range" value="1000"/>
      <span class="cost-val" id="costLabel">Any</span>
    </div>

    <div class="section-label" style="margin-top:16px">Availability</div>
    <div class="cost-row">
      <input id="ticketsSlider" max="1000" min="0" oninput="onTickets(this.value)" step="1" type="range"
             value="0"/>
      <span class="cost-val" id="ticketsLabel">Any</span>
    </div>
    <div style="font-size:11px;color:var(--text4);margin-top:4px">Min tickets available</div>

    <div class="section-label" style="margin-top:16px">Start Time</div>
    <div class="cost-row">
      <input id="timeFromSlider" max="1410" min="0" oninput="onTimeFrom(this.value)" step="30" type="range" value="0"/>
      <span class="cost-val" id="timeFromLabel">Any</span>
    </div>
    <div style="font-size:11px;color:var(--text4);margin-top:4px">Show events starting at or after this time</div>

    <div class="section-label" style="margin-top:16px">Age Group</div>
    <div class="type-list" id="ageFilters"></div>

    <div class="section-label" style="margin-top:16px">Experience</div>
    <div class="type-list" id="expFilters"></div>
  </aside>

  <main>
    <div class="search-wrap">
      <input autocomplete="off" id="searchBox"
             oninput="debounceSearch()"
             placeholder="Search by title, game system, GM, description…" type="search"/>
      <ul class="suggestions" id="suggestions" style="display:none"></ul>
    </div>

    <div class="sort-row">
      <button id="filterToggleBtn" onclick="toggleMobileFilters()">
        ⚙ Filters <span class="filter-badge" data-count="0" id="filterBadge"></span>
      </button>
      <label>Sort by</label>
      <select id="sortBy" onchange="onDropdownSort()">
        <option id="relevanceOption" style="display:none" value="relevance">Relevance</option>
        <option value="date">Date &amp; Time</option>
        <option value="cost">Cost</option>
        <option value="title">Title</option>
        <option value="duration">Duration</option>
        <option value="type">Type</option>
        <option value="tickets">Tickets</option>
      </select>
      <span style="margin-left:auto;display:flex;align-items:center;gap:7px">
        <label>Per page</label>
        <div class="seg-group" id="pageSizeSeg">
          <button class="seg-btn active" onclick="setPageSize(50,this)">50</button>
          <button class="seg-btn" onclick="setPageSize(100,this)">100</button>
          <button class="seg-btn" onclick="setPageSize(2000,this)">2000</button>
          <button class="seg-btn" onclick="setPageSize(Infinity,this)">All</button>
        </div>
      </span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
        <tr>
          <th data-col="title" onclick="setSort('title')">Title <span class="sort-arrow"></span></th>
          <th data-col="date" onclick="setSort('date')">Date &amp; Time <span class="sort-arrow"></span></th>
          <th data-col="type" onclick="setSort('type')">Type <span class="sort-arrow"></span></th>
          <th data-col="cost" onclick="setSort('cost')">Cost <span class="sort-arrow"></span></th>
          <th data-col="duration" onclick="setSort('duration')">Duration <span class="sort-arrow"></span></th>
          <th data-col="tickets" onclick="setSort('tickets')">Tickets <span class="sort-arrow"></span></th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="no-results" id="noResults" style="display:none">No events match your filters.</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard">
    <button class="detail-close" onclick="closeDetailBtn()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
